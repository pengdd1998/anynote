# golangci-lint configuration for AnyNote Go backend
# https://golangci-lint.run/usage/configuration/
version: "2"

run:
  go: "1.25"
  timeout: 5m

output:
  sort-order:
    - file
    - linter
    - severity

linters:
  default: none
  enable:
    - errcheck      # unchecked errors
    - govet         # go vet
    - staticcheck   # advanced static analysis
    - unused        # unused code
    - ineffassign   # ineffective assignments
    - gocritic      # style/performance issues
    - goconst       # repeated strings
    - misspell      # typos
    - unconvert     # unnecessary conversions
    - prealloc      # slice preallocation
    - unparam       # unused function parameters
    - whitespace    # extra whitespace

  settings:
    errcheck:
      check-type-assertions: true
      check-blank: false

    govet:
      enable-all: true
      disable:
        - shadow
        - fieldalignment
        - unusedwrite

    staticcheck:
      checks: ["all"]

    gocritic:
      enabled-tags:
        - diagnostic
        - style
        - performance
      disabled-checks:
        - hugeParam
        - rangeValCopy
        - exitAfterDefer
        - importShadow
        - octalLiteral
        - httpNoBody
        - paramTypeCombine
        - unnamedResult
        - commentFormatting
        - unnecessaryBlock
        - builtinShadow
        - typeDefFirst
        - dupImport

    goconst:
      min-occurrences: 5
      min-len: 3
      ignore-tests: true

    misspell:
      locale: US

    unparam:
      check-exported: false

    prealloc:
      simple: true
      range-loops: true
      for-loops: false

    whitespace:
      multi-if: false
      multi-func: false

  exclusions:
    generated: strict
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - goconst
          - prealloc
          - unparam
          - gocritic
      - path: ".*\\.pb\\.go$"
        linters:
          - all
      - path: ".*\\.sql\\.go$"
        linters:
          - all
      # defer Close() errors are acceptable in long-running processes
      - linters:
          - errcheck
        source: "defer .+\\.Close\\(\\)"
    paths:
      - db/migrations

issues:
  max-issues-per-linter: 50
  max-same-issues: 3

severity:
  default: warning
