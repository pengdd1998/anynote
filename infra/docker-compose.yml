# Shared Infrastructure — PostgreSQL, Redis, MinIO
#
# Used by both anynote and read-pal projects.
# Each project connects via the `shared-infra` external network.
#
# Usage:
#   docker compose -f infra/docker-compose.yml up -d

services:
  postgres:
    image: postgres:16-alpine
    container_name: infra-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-readpal}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-readpal}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sh:/docker-entrypoint-initdb.d/01-init-db.sh:ro
    ports:
      - "${POSTGRES_PORT:-35551}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-readpal}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    mem_limit: 1024m
    shm_size: 256mb
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    networks:
      - shared-infra

  redis:
    image: redis:7-alpine
    container_name: infra-redis
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-35552}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    mem_limit: 256m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    networks:
      - shared-infra

  minio:
    image: minio/minio:latest
    container_name: infra-minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    mem_limit: 512m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    networks:
      - shared-infra

volumes:
  postgres_data:
    name: read-pal_postgres_data
  redis_data:
    name: read-pal_redis_data
  minio_data:
    name: shared-minio-data

networks:
  shared-infra:
    name: shared-infra
    driver: bridge
