# Base Docker Compose for AnyNote
#
# This file defines all services with their common configuration.
# Use with an override file for the target environment:
#
#   Development:
#     docker compose -f docker-compose.yml -f docker-compose.override.yml up -d
#
#   Production:
#     docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# When no override file is specified, Docker Compose automatically reads
# docker-compose.override.yml if it exists.

services:
  postgres:
    image: postgres:16-alpine
    container_name: anynote-postgres
    environment:
      POSTGRES_USER: anynote
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-anynote_dev}
      POSTGRES_DB: anynote
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/01_schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U anynote"]
      interval: 5s
      timeout: 5s
      retries: 5
    mem_limit: 512m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  redis:
    image: redis:7-alpine
    container_name: anynote-redis
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    mem_limit: 256m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  minio:
    image: minio/minio:latest
    container_name: anynote-minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    mem_limit: 512m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  chrome:
    image: chromedp/headless-shell:latest
    container_name: anynote-chrome
    environment:
      - CHROME_FLAGS=--no-sandbox --disable-gpu --disable-dev-shm-usage
    mem_limit: 1024m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - SYS_ADMIN

  server:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: anynote-server
    environment:
      - DATABASE_URL=postgres://anynote:${POSTGRES_PASSWORD:-anynote_dev}@postgres:5432/anynote?sslmode=disable
      - REDIS_URL=redis://redis:6379/0
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-minioadmin}
      - JWT_SECRET=${JWT_SECRET:-dev-jwt-secret-change-in-production}
      - MASTER_ENCRYPTION_KEY=${MASTER_ENCRYPTION_KEY:-dev-master-key-change-in-production}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - QWEN_API_KEY=${QWEN_API_KEY:-}
      - PORT=${PORT:-36661}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - WS_ALLOWED_ORIGINS=${WS_ALLOWED_ORIGINS:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["./server"]
    mem_limit: 512m
    read_only: true
    tmpfs:
      - /tmp:size=64M
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    container_name: anynote-worker
    environment:
      - DATABASE_URL=postgres://anynote:${POSTGRES_PASSWORD:-anynote_dev}@postgres:5432/anynote?sslmode=disable
      - REDIS_URL=redis://redis:6379/0
      - CHROME_WS_URL=ws://chrome:9222
      - LOG_LEVEL=${LOG_LEVEL:-info}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      chrome:
        condition: service_started
    command: ["./worker"]
    mem_limit: 512m
    read_only: true
    tmpfs:
      - /tmp:size=64M
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

volumes:
  postgres_data:
  redis_data:
  minio_data:
