name: anynote
description: Local-first privacy-first note-taking app with E2E encryption.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Local database (SQLite + SQLCipher)
  drift: ^2.16.0
  drift_flutter: ^0.1.0
  sqlite3_flutter_libs: ^0.5.24

  # E2E Encryption
  cryptography: ^2.7.0
  secure_store: ^0.1.0
  flutter_secure_storage: ^9.2.2

  # Networking
  dio: ^5.4.3+1
  retrofit: ^4.1.0
  json_annotation: ^4.9.0

  # Routing
  go_router: ^14.2.1

  # UI
  flutter_hooks: ^0.20.5
  hooks_riverpod: ^2.5.1
  flutter_animate: ^4.5.0

  # Utils
  uuid: ^4.4.0
  intl: ^0.19.0
  freezed_annotation: ^2.4.3
  path_provider: ^2.1.3
  path: ^1.9.0
  collection: ^1.18.0
  rxdart: ^0.28.0
  share_plus: ^9.0.0
  url_launcher: ^6.3.0
  cached_network_image: ^3.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.9
  drift_dev: ^2.16.0
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  retrofit_generator: ^8.1.0
  riverpod_generator: ^2.4.0
  mockito: ^5.4.4

flutter:
  uses-material-design: true
  assets:
    - assets/
