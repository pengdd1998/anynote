name: anynote
description: Local-first privacy-first note-taking app with E2E encryption.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Local database (SQLite + SQLCipher)
  drift: ^2.16.0
  drift_flutter: ^0.1.0
  sqlite3_flutter_libs: ^0.5.24

  # E2E Encryption
  sodium: ^3.4.6
  sodium_libs: ^3.4.6
  secure_store: ^0.1.0
  flutter_secure_storage: ^9.2.2

  # Networking
  connectivity_plus: ^6.0.3
  dio: ^5.4.3+1
  json_annotation: ^4.9.0
  web_socket_channel: ^3.0.1

  # Routing
  go_router: ^14.2.1

  # UI
  flutter_hooks: ^0.20.5
  hooks_riverpod: ^2.5.1
  flutter_animate: ^4.5.0
  flutter_markdown: ^0.7.4+1
  flutter_math_fork: ^0.7.0
  markdown: ^7.1.1
  file_picker: ^8.0.0
  flutter_quill: ^11.0.0

  # App info
  package_info_plus: ^8.0.0

  # Utils
  uuid: ^4.4.0
  intl: ^0.20.2
  freezed_annotation: ^3.1.0
  path_provider: ^2.1.3
  path: ^1.9.0
  collection: ^1.18.0
  rxdart: ^0.28.0
  share_plus: ^10.0.0
  url_launcher: ^6.3.0
  cached_network_image: ^3.3.1
  image_picker: ^1.0.0
  flutter_image_compress: ^2.3.0
  crypto: ^3.0.3
  shared_preferences: ^2.2.3
  web: ^1.1.0

  # WebView (mermaid diagram rendering)
  webview_flutter: ^4.10.0

  # Home screen quick actions (iOS / Android)
  quick_actions: ^1.1.0

  # Desktop drag-and-drop file support
  desktop_drop: ^0.5.0

  # Desktop
  window_manager: ^0.4.3

  # Push Notifications
  # Note: These require Firebase project setup (google-services.json / GoogleService-Info.plist).
  # See frontend/firebase/README.md for setup instructions.
  firebase_core: ^3.0.0
  firebase_messaging: ^15.0.0

  # Local Notifications (scheduled reminders)
  flutter_local_notifications: ^18.0.0
  timezone: ^0.9.4

  # PDF export
  printing: ^5.12.0
  pdf: ^3.10.0

  # Background sync
  workmanager: ^0.6.0
  archive: ^4.0.9

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.9
  drift_dev: ^2.16.0
  freezed: ^3.1.0
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.0

  # App Store assets
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.3

  sqlite3: any
flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/
    - assets/fonts/
