<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="AnyNote - Privacy-first encrypted note-taking app with E2E encryption">

  <!-- Theme color matching warm terracotta brand seed -->
  <meta name="theme-color" content="#C4956A">
  <meta name="theme-color" content="#C4956A" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#1A1614" media="(prefers-color-scheme: dark)">

  <!-- Content Security Policy -- strict, no unsafe-eval -->
  <meta http-equiv="Content-Security-Policy" content="
    default-src 'self';
    script-src 'self';
    style-src 'self' 'unsafe-inline';
    object-src 'none';
    base-uri 'self';
    form-action 'self';
    img-src 'self' data: blob: https:;
    connect-src 'self' http://localhost:* https://localhost:* ws://localhost:* wss://* https:;
    font-src 'self';
    manifest-src 'self';
  ">

  <!-- PWA capability flags -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="AnyNote">

  <!-- App icons -->
  <link rel="icon" type="image/png" sizes="32x32" href="icons/Icon-192.png">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="apple-touch-icon" sizes="512x512" href="icons/Icon-512.png">

  <title>AnyNote</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
