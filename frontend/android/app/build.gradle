plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

// Apply Google Services plugin only when google-services.json is present.
// This allows the app to build and run without Firebase for development.
if (file("google-services.json").exists()) {
    apply plugin: "com.google.gms.google-services"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty('flutter.versionCode')
if (flutterVersionCode == null) {
    flutterVersionCode = '1'
}

def flutterVersionName = localProperties.getProperty('flutter.versionName')
if (flutterVersionName == null) {
    flutterVersionName = '0.1.0'
}

android {
    namespace 'com.anynote.app'
    compileSdk 36

    defaultConfig {
        applicationId "com.anynote.app"
        minSdk 24
        targetSdk 36
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
    }

    // ---------------------------------------------------------------
    // Release signing configuration
    // ---------------------------------------------------------------
    // To create a release build:
    // 1. Generate keystore:
    //      keytool -genkey -v -keystore upload-keystore.jks \
    //        -keyalg RSA -keysize 2048 -validity 10000 -alias upload
    // 2. Set environment variables (or add to ~/.gradle/gradle.properties):
    //      ANDROID_KEYSTORE_PATH, ANDROID_KEYSTORE_PASSWORD,
    //      ANDROID_KEY_ALIAS, ANDROID_KEY_PASSWORD
    // 3. Place the keystore file at android/app/upload-keystore.jks
    //    (this path is gitignored)
    // ---------------------------------------------------------------

    signingConfigs {
        debug {
            def ksPath = System.getenv("ANDROID_KEYSTORE_PATH") ?: null
            storeFile = (ksPath && file(ksPath).exists())
                    ? file(ksPath)
                    : debugKeystoreFile()
            storePassword = System.getenv("ANDROID_KEYSTORE_PASSWORD") ?: "android"
            keyAlias = System.getenv("ANDROID_KEY_ALIAS") ?: "androiddebugkey"
            keyPassword = System.getenv("ANDROID_KEY_PASSWORD") ?: "android"
        }
        release {
            def keystorePath = System.getenv("ANDROID_KEYSTORE_PATH") ?: null
            if (keystorePath && file(keystorePath).exists()) {
                storeFile file(keystorePath)
                storePassword System.getenv("ANDROID_KEYSTORE_PASSWORD")
                keyAlias System.getenv("ANDROID_KEY_ALIAS")
                keyPassword System.getenv("ANDROID_KEY_PASSWORD")
            }
        }
    }

    buildTypes {
        debug {
            signingConfig signingConfigs.debug
            minifyEnabled false
        }
        release {
            // Use release keystore if available, otherwise fall back to debug
            // signing for CI builds without keystore secrets configured.
            signingConfig signingConfigs.release.storeFile != null
                    ? signingConfigs.release
                    : signingConfigs.debug
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    compileOptions {
        coreLibraryDesugaringEnabled true
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = '1.8'
    }
}

flutter {
    source '../..'
}

dependencies {
    coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.1.4'
}

// Helper to locate or create the debug keystore
def debugKeystoreFile() {
    def keystore = file("${System.getProperty('user.home')}/.android/debug.keystore")
    if (!keystore.exists()) {
        keystore.parentFile.mkdirs()
        exec {
            commandLine 'keytool', '-genkey',
                '-v', '-keystore', keystore.absolutePath,
                '-storepass', 'android',
                '-alias', 'androiddebugkey',
                '-keypass', 'android',
                '-keyalg', 'RSA',
                '-keysize', '2048',
                '-validity', '10000',
                '-dname', 'CN=Android Debug,O=Android,C=US'
        }
    }
    return keystore
}
