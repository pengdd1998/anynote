# Production overrides for AnyNote
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# This file overrides the base docker-compose.yml with production settings:
#   - Resource limits (CPU / memory) for all services
#   - Restart policies (unless-stopped)
#   - Extended health checks with start periods
#   - Three-tier network isolation (frontend, backend, data)
#   - Structured logging (json-file driver with rotation)
#   - No source-code volume mounts (use built images)
#   - Security hardening (read-only fs, no-new-privileges where possible)
#   - PostgreSQL tuned for production workloads
#   - Redis with persistence, memory limits, and eviction policy
#
# Required environment variables -- copy .env.example to .env and set values:
#   POSTGRES_PASSWORD, JWT_SECRET, MASTER_ENCRYPTION_KEY
#   MINIO_ACCESS_KEY, MINIO_SECRET_KEY

services:
  # ── PostgreSQL ────────────────────────────────────────
  postgres:
    restart: unless-stopped
    shm_size: 256mb
    environment:
      POSTGRES_USER: anynote
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: anynote
    # Override base file ports -- no host exposure in production.
    # Access is restricted to the data network only.
    ports: []
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    command:
      - postgres
      - -c
      - shared_buffers=256MB
      - -c
      - work_mem=16MB
      - -c
      - effective_cache_size=768MB
      - -c
      - maintenance_work_mem=128MB
      - -c
      - wal_buffers=16MB
      - -c
      - min_wal_size=512MB
      - -c
      - max_wal_size=2GB
      - -c
      - checkpoint_completion_target=0.9
      - -c
      - max_connections=100
      - -c
      - log_min_duration_statement=1000
      - -c
      - log_checkpoints=on
      - -c
      - log_connections=on
      - -c
      - log_disconnections=on
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U anynote -d anynote -q"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2048M
        reservations:
          cpus: "0.5"
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    networks:
      - data

  # ── Redis ─────────────────────────────────────────────
  redis:
    restart: unless-stopped
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
      --save 60 1000
      --save 300 100
    # Override base file ports -- no host exposure in production
    ports: []
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    networks:
      - data

  # ── MinIO ─────────────────────────────────────────────
  minio:
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    # Override base file ports -- no host exposure in production
    ports: []
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1024M
        reservations:
          cpus: "0.25"
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    networks:
      - data

  # ── Chrome headless ───────────────────────────────────
  chrome:
    restart: unless-stopped
    environment:
      - CHROME_FLAGS=--no-sandbox --disable-gpu --disable-dev-shm-usage --disable-setuid-sandbox
    # Override base file ports -- no host exposure in production
    ports: []
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:9222/json/version || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2048M
        reservations:
          cpus: "0.5"
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"
    networks:
      - backend

  # ── API Server ────────────────────────────────────────
  server:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        VERSION: ${VERSION:-latest}
        COMMIT: ${COMMIT:-unknown}
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://anynote:${POSTGRES_PASSWORD}@postgres:5432/anynote?sslmode=disable
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      MASTER_ENCRYPTION_KEY: ${MASTER_ENCRYPTION_KEY:?MASTER_ENCRYPTION_KEY is required}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      QWEN_API_KEY: ${QWEN_API_KEY:-}
      PORT: ${PORT:-36661}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports:
      - "${PORT:-36661}:36661"
    # Override base file -- no source mount in production
    volumes: []
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:${PORT:-36661}/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1024M
        reservations:
          cpus: "0.5"
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "10"
    networks:
      - frontend
      - backend
      - data

  # ── Background Worker ─────────────────────────────────
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
      args:
        VERSION: ${VERSION:-latest}
        COMMIT: ${COMMIT:-unknown}
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://anynote:${POSTGRES_PASSWORD}@postgres:5432/anynote?sslmode=disable
      REDIS_URL: redis://redis:6379/0
      CHROME_WS_URL: ws://chrome:9222
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      MASTER_ENCRYPTION_KEY: ${MASTER_ENCRYPTION_KEY:?MASTER_ENCRYPTION_KEY is required}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    # Override base file -- no source mount in production
    volumes: []
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      chrome:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "ps aux | grep -v grep | grep -q worker || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1024M
        reservations:
          cpus: "0.25"
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "10"
    networks:
      - backend
      - data

# ── Persistent volumes ─────────────────────────────────
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local

# ── Network isolation (three-tier) ─────────────────────
#
#   frontend  -- server only; accepts external traffic via published port
#   backend   -- server <-> worker <-> chrome; no external access
#   data      -- postgres, redis, minio; only server + worker connect here
#
networks:
  frontend:
    name: anynote-frontend
    driver: bridge
  backend:
    name: anynote-backend
    driver: bridge
    internal: true
  data:
    name: anynote-data
    driver: bridge
    internal: true
