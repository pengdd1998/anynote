name: CI

# AnyNote continuous integration: backend tests, frontend tests, database migrations.

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# ---------------------------------------------------------------------------
# Jobs
# ---------------------------------------------------------------------------

jobs:
  # ── Backend ──────────────────────────────────────────────────────────────
  backend:
    name: Go Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go 1.25
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: ~/go/pkg/mod
          key: go-${{ hashFiles('backend/go.sum') }}
          restore-keys: |
            go-

      - name: Download dependencies
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.4
          working-directory: backend
          verify: false

      - name: Security scan (gosec)
        continue-on-error: true
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          gosec ./...

      - name: Test with coverage
        run: |
          go test ./... \
            -race \
            -count=1 \
            -coverprofile=coverage.out \
            -covermode=atomic

      - name: Check coverage threshold (50%)
        run: |
          COV=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | sed 's/%//')
          echo "Go coverage: ${COV}%"
          if (( $(echo "$COV < 50" | bc -l) )); then
            echo "Coverage $COV% is below 50% threshold"
            exit 1
          fi

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.out
          retention-days: 14

      - name: Vulnerability check (govulncheck)
        continue-on-error: true
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  # ── Frontend ─────────────────────────────────────────────────────────────
  frontend:
    name: Flutter Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install system dependencies (libsodium for crypto tests)
        run: sudo apt-get update && sudo apt-get install -y libsodium-dev

      - name: Flutter version
        run: flutter --version

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code (Drift, etc.)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Test with coverage
        run: flutter test --coverage

      - name: Check coverage threshold
        # lcov/genhtml may not be available on the runner; skip gracefully.
        run: |
          if command -v lcov &> /dev/null; then
            TOTAL=$(lcov --summary coverage/lcov.info 2>&1 | grep lines | awk '{print $2}' | sed 's/%//')
            echo "Flutter line coverage: ${TOTAL}%"
            if (( $(echo "$TOTAL < 60" | bc -l) )); then
              echo "Coverage $TOTAL% is below 60% threshold"
              exit 1
            fi
          else
            echo "lcov not available; skipping coverage threshold check"
          fi

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage/lcov.info
          retention-days: 14

      - name: Dependency audit
        continue-on-error: true
        run: flutter pub outdated

  # ── Integration Tests ────────────────────────────────────────────────────
  integration:
    name: Integration Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: anynote
          POSTGRES_PASSWORD: test
          POSTGRES_DB: anynote_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U anynote"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    env:
      DATABASE_URL: "postgres://anynote:test@localhost:5432/anynote_test?sslmode=disable"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go 1.25
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Download dependencies
        run: go mod download

      - name: Run integration tests
        run: go test -tags=integration -v -count=1 ./internal/repository/ ./internal/handler/

  # ── Database Migrations ──────────────────────────────────────────────────
  migrations:
    name: Database Migrations
    runs-on: ubuntu-latest
    needs: backend

    # PostgreSQL service container for migration testing.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: anynote
          POSTGRES_PASSWORD: test
          POSTGRES_DB: anynote_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U anynote"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go 1.25
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Build migrate binary
        run: go build -o /tmp/migrate ./cmd/migrate

      - name: Run migrations (first pass)
        run: |
          DATABASE_URL="postgres://anynote:test@localhost:5432/anynote_test?sslmode=disable" /tmp/migrate

      - name: Run migrations again (idempotency check)
        run: |
          DATABASE_URL="postgres://anynote:test@localhost:5432/anynote_test?sslmode=disable" /tmp/migrate
