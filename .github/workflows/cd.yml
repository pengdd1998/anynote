name: CD - Deploy

on:
  push:
    tags:
      - 'v*'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Extract version from tag
        id: meta
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -euo pipefail

            echo "=== Deploying AnyNote v${{ steps.meta.outputs.version }} ==="

            # Pull latest code
            cd /home/ubuntu/projects/any-note
            git fetch --tags
            git checkout v${{ steps.meta.outputs.version }}

            # Ensure shared infrastructure is running
            docker compose -f infra/docker-compose.yml up -d

            # Wait for postgres to be ready
            echo "Waiting for postgres..."
            for i in $(seq 1 30); do
              if docker exec infra-postgres pg_isready -U readpal -q 2>/dev/null; then
                echo "Postgres ready."
                break
              fi
              sleep 1
            done

            # Create anynote database if it doesn't exist
            docker exec infra-postgres psql -U readpal -tc "SELECT 1 FROM pg_database WHERE datname='anynote'" | grep -q 1 || \
              docker exec infra-postgres psql -U readpal -c "CREATE DATABASE anynote"

            # Run database migrations
            echo "Running migrations..."
            docker compose -f docker-compose.deploy.yml build server
            docker compose -f docker-compose.deploy.yml run --rm --no-deps server /app/migrate up || true

            # Build and deploy application services
            echo "Building and deploying..."
            docker compose -f docker-compose.deploy.yml build
            docker compose -f docker-compose.deploy.yml up -d

            # Health check
            echo "Health check..."
            for i in $(seq 1 15); do
              if curl -sf http://localhost:36661/health > /dev/null 2>&1; then
                echo "Server is healthy."
                break
              fi
              if [ "$i" -eq 15 ]; then
                echo "WARNING: Health check failed after 15s"
                docker compose -f docker-compose.deploy.yml logs --tail=20 server
              fi
              sleep 1
            done

            # Cleanup old images and build cache to save disk space
            echo "Cleaning up..."
            docker image prune -af --filter "until=24h" 2>/dev/null || true
            docker builder prune -af --filter "until=24h" 2>/dev/null || true

            echo "=== Deploy complete ==="
